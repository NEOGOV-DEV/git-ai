name: OpenCode Plugin Type Check

on:
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-support/opencode

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: agent-support/opencode/yarn.lock

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run type check
        run: yarn type-check

